<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor Monedas</title>  
</head>

<body>
    <h1>Conversos de Divisas</h1>
    <input type="number" id="cantidad" placeholder="Cantidad a convertir">
    <input type="button" id="boton" value="Convertir">
    <div id="Resultado">¿Qué hora es?</div>

    <script>
        let url="https://api.frankfurter.dev/v2/rates"
        let boton = document.getElementById("boton")
        let resultado = document.getElementById("Resultado")


    /* VA A PEDIR LA HORA*/
    function leerHora(){
        let hora="ahhh"
        fetch (url)
        .then (response => {  
            console.log(response)
            return response.json()
        })

        .then (data => {
            console.log(data.time)
            hora=data.time
            resultado.innerHTML=hora

        })
        .catch()

    }

        boton.addEventListener("click", (e) => {
           leerHora()
           console.log("Me han pulsado")
           /* resultado.innerHTML="Me han pulsado"+e.target.value*/
        
        })
</script>
</body>
</html>
